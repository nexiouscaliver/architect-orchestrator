name: validate

# Validates the plugin manifest, marketplace catalog, directory layout,
# version sync, and skill/agent frontmatter. Runs on pushes to main, on
# version tags, on pull requests, and manually. Dependency-free.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate plugin manifest, layout, and frontmatter
        run: python scripts/validate_plugin.py
